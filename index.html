<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LiPicons · v1.0.0 · gallery</title>
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #FBF7EF 0%, #EBE3D0 100%);
    color: #0F2D5E;
    min-height: 100vh;
    padding: 32px;
  }
  .wrap { max-width: 1240px; margin: 0 auto; }
  header { display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 18px; border-bottom: 1px solid #E5DFD3; margin-bottom: 20px; }
  h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.8px; }
  h1 em { font-style: italic; color: #B59C6A; font-weight: 500; }
  .sub { color: #6B7A92; font-size: 13px; margin-top: 4px; }
  .meta { font-family: ui-monospace, monospace; font-size: 11px; color: #8A7C5F; text-align: right; line-height: 1.7; }
  .meta b { color: #0F2D5E; font-weight: 600; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
  .search { flex: 1; min-width: 280px; padding: 10px 14px; font: inherit; font-size: 14px; background: rgba(255,255,255,0.7); border: 1px solid #E5DFD3; border-radius: 10px; outline: none; color: #0F2D5E; }
  .pill-group { display: flex; gap: 2px; background: rgba(255,255,255,0.6); border: 1px solid #E5DFD3; border-radius: 10px; padding: 3px; }
  .pill { padding: 6px 12px; font-size: 10px; font-family: ui-monospace, monospace; letter-spacing: 0.08em; color: #6B7A92; background: transparent; border: none; cursor: pointer; border-radius: 7px; text-transform: uppercase; }
  .pill.on { background: #0F2D5E; color: #fff; }
  .count { padding: 8px 14px; background: #0F2D5E; color: #fff; border-radius: 999px; font-size: 11px; font-family: ui-monospace, monospace; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
  .tile { background: rgba(255,255,255,0.65); border: 1px solid #E5DFD3; border-radius: 12px; padding: 16px 8px 10px; display: flex; flex-direction: column; align-items: center; transition: all .15s; }
  .tile:hover { background: #fff; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(15,45,94,.08); }
  .tile svg { color: #0F2D5E; margin-bottom: 8px; }
  .tile .name { font-size: 10px; font-family: ui-monospace, monospace; color: #6B7A92; text-align: center; word-break: break-all; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>LiPicons · <em>gallery</em></h1>
      <div class="sub">All <span id="n">—</span> icons rendered from the local sprite. Open the file directly or serve over HTTP.</div>
    </div>
    <div class="meta">
      © 2026 <b>imagiQa</b><br/>
      v1.0.0 · <span id="vn">regular</span><br/>
      Partner Licence
    </div>
  </header>

  <div class="toolbar">
    <input class="search" id="q" placeholder="Search icons by name…"/>
    <div class="pill-group" id="vp">
      <button class="pill on" data-v="regular">Regular</button>
      <button class="pill" data-v="bold">Bold</button>
      <button class="pill" data-v="light">Light</button>
      <button class="pill" data-v="thin">Thin</button>
      <button class="pill" data-v="fill">Fill</button>
      <button class="pill" data-v="duotone">Duotone</button>
    </div>
    <div class="count" id="c">— / —</div>
  </div>

  <div id="grid" class="grid"></div>
</div>

<script>
let variant = 'regular';
let manifest = null;
let q = '';

async function load() {
  const res = await fetch('./dist/json/icons.json');
  manifest = await res.json();
  document.getElementById('n').textContent = manifest.count;
  render();
}

function spriteFor(v) { return v === 'regular' ? './dist/lipicons.svg' : './dist/lipicons.' + v + '.svg'; }

function render() {
  document.getElementById('vn').textContent = variant;
  const names = Object.keys(manifest.icons).filter(n =>
    !q || n.includes(q.toLowerCase()) || (manifest.icons[n].keywords||[]).some(k => k.includes(q.toLowerCase()))
  );
  document.getElementById('c').textContent = names.length + ' / ' + manifest.count;
  const sprite = spriteFor(variant);
  document.getElementById('grid').innerHTML = names.map(n =>
    `<div class="tile">
      <svg width="32" height="32"><use href="${sprite}#${n}"/></svg>
      <div class="name">${n}</div>
    </div>`
  ).join('');
}

document.getElementById('q').addEventListener('input', e => { q = e.target.value; render(); });
document.getElementById('vp').addEventListener('click', e => {
  const v = e.target.dataset.v; if (!v) return;
  variant = v;
  document.querySelectorAll('#vp .pill').forEach(p => p.classList.toggle('on', p.dataset.v === v));
  render();
});
load();
</script>
</body>
</html>
